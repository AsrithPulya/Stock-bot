services:
  - type: web
    name: stock-bot-dashboard
    env: python
    buildCommand: pip install -r requirements.txt
    startCommand: streamlit run app.py --server.port $PORT --server.address 0.0.0.0
    envVars:
      - key: GEMINI_API_KEY
        sync: false
      - key: GROWW_API_KEY
        sync: false
      - key: GROWW_API_SECRET
        sync: false
